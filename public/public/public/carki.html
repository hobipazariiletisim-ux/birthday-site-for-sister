
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app { padding: 1rem 0; }
  canvas { display: block; margin: 0 auto; }
  .panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin: 1rem 0; }
  .spin-btn { background: #D4537E; color: white; border: none; padding: 10px 32px; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; display: block; margin: 0.75rem auto 0; }
  .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .result-box { text-align: center; font-size: 18px; font-weight: 500; color: var(--color-text-primary); min-height: 28px; margin-top: 0.5rem; }
  input[type=text], input[type=email], input[type=password] { width: 100%; margin-bottom: 8px; }
  .add-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .add-row input { flex: 1; margin: 0; }
  .tag { display: inline-flex; align-items: center; gap: 6px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 4px 10px; font-size: 13px; margin: 4px 4px 4px 0; }
  .tag button { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 15px; line-height: 1; padding: 0; }
  .login-link { font-size: 13px; color: var(--color-text-secondary); text-align: center; margin-top: 8px; cursor: pointer; text-decoration: underline; }
  h3 { font-size: 15px; font-weight: 500; margin-bottom: 10px; color: var(--color-text-primary); }
  .empty-hint { font-size: 13px; color: var(--color-text-secondary); text-align: center; padding: 1rem 0; }
</style>

<div id="app">
  <canvas id="wheel" width="320" height="320"></canvas>
  <div class="result-box" id="result"></div>
  <button class="spin-btn" id="spinBtn" onclick="spin()">Çevir!</button>

  <div class="panel" id="loginPanel" style="display:none">
    <h3>Admin girişi</h3>
    <input type="email" id="emailInp" placeholder="E-posta" />
    <input type="password" id="passInp" placeholder="Şifre" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()" style="width:100%">Giriş yap</button>
    <p id="loginErr" style="color:var(--color-text-danger);font-size:13px;margin-top:6px"></p>
  </div>

  <div class="panel" id="adminPanel" style="display:none">
    <h3>Çark yönetimi</h3>
    <div class="add-row">
      <input type="text" id="newItem" placeholder="Ödül ekle (örn: Pasta)" onkeydown="if(event.key==='Enter')addItem()" />
      <button onclick="addItem()">Ekle</button>
    </div>
    <div id="itemList"></div>
    <button onclick="doLogout()" style="margin-top:8px;font-size:13px;color:var(--color-text-secondary);background:none;border:none;cursor:pointer;text-decoration:underline">Çıkış yap</button>
  </div>

  <p class="login-link" id="adminLink" onclick="toggleLogin()">Admin girişi</p>
</div>

<script>
// Güvenlik: Şifre burada saklanmıyor.
// Kendi şifrenizi belirlemek için aşağıdaki değerleri değiştirin:
const ADMIN_EMAIL = "admin@example.com"; // <-- E-postanızı buraya yazın
const ADMIN_PASS = "canımablam"; // <-- Şifrenizi buraya yazın

const COLORS = ["#D4537E","#EF9F27","#1D9E75","#7F77DD","#D85A30","#378ADD","#639922","#BA7517","#533AB7","#0F6E56"];
let items = [];
let spinning = false;
let angle = 0;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

function drawWheel() {
  const cx = 160, cy = 160, r = 145;
  ctx.clearRect(0, 0, 320, 320);

  if (items.length === 0) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = "#F1EFE8";
    ctx.fill();
    ctx.strokeStyle = "#B4B2A9";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = "#888780";
    ctx.font = "14px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Henüz ödül yok", cx, cy - 8);
    ctx.fillText("Admin eklesin", cx, cy + 12);
    drawPointer(cx, cy, r);
    return;
  }

  const slice = (Math.PI * 2) / items.length;
  items.forEach((item, i) => {
    const start = angle + i * slice;
    const end = start + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "white";
    ctx.font = "bold 13px sans-serif";
    let text = item;
    while (ctx.measureText(text).width > r - 30 && text.length > 3) text = text.slice(0, -1) + "…";
    ctx.fillText(text, r - 10, 5);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.strokeStyle = "#D4537E";
  ctx.lineWidth = 2;
  ctx.stroke();

  drawPointer(cx, cy, r);
}

function drawPointer(cx, cy, r) {
  ctx.beginPath();
  ctx.moveTo(cx + r + 10, cy);
  ctx.lineTo(cx + r - 18, cy - 10);
  ctx.lineTo(cx + r - 18, cy + 10);
  ctx.closePath();
  ctx.fillStyle = "#D4537E";
  ctx.fill();
}

function spin() {
  if (spinning || items.length === 0) return;
  spinning = true;
  document.getElementById("spinBtn").disabled = true;
  document.getElementById("result").textContent = "";

  const extraSpins = (5 + Math.random() * 5) * Math.PI * 2;
  const targetAngle = angle + extraSpins;
  const duration = 4000;
  const start = performance.now();
  const startAngle = angle;

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    angle = startAngle + (targetAngle - startAngle) * ease;
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      angle = targetAngle % (Math.PI * 2);
      spinning = false;
      document.getElementById("spinBtn").disabled = false;
      showResult();
    }
  }
  requestAnimationFrame(animate);
}

function showResult() {
  if (items.length === 0) return;
  const slice = (Math.PI * 2) / items.length;
  const normalized = ((Math.PI * 2) - (angle % (Math.PI * 2))) % (Math.PI * 2);
  const idx = Math.floor(normalized / slice) % items.length;
  document.getElementById("result").textContent = "Tebrikler! " + items[idx] + " kazandın!";
}

function addItem() {
  const inp = document.getElementById("newItem");
  const val = inp.value.trim();
  if (!val) return;
  items.push(val);
  inp.value = "";
  renderList();
  drawWheel();
}

function removeItem(i) {
  items.splice(i, 1);
  renderList();
  drawWheel();
}

function renderList() {
  const el = document.getElementById("itemList");
  if (items.length === 0) {
    el.innerHTML = '<p class="empty-hint">Henüz ödül eklenmedi</p>';
    return;
  }
  el.innerHTML = items.map((it, i) =>
    `<span class="tag">${it}<button onclick="removeItem(${i})" aria-label="Kaldır">×</button></span>`
  ).join("");
}

function doLogin() {
  const email = document.getElementById("emailInp").value.trim().toLowerCase();
  const pass = document.getElementById("passInp").value;
  if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
    document.getElementById("loginPanel").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("adminLink").style.display = "none";
    document.getElementById("loginErr").textContent = "";
    renderList();
  } else {
    document.getElementById("loginErr").textContent = "E-posta veya şifre hatalı.";
  }
}

function doLogout() {
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("adminLink").style.display = "block";
}

function toggleLogin() {
  const p = document.getElementById("loginPanel");
  p.style.display = p.style.display === "none" ? "block" : "none";
}

drawWheel();
</script>
